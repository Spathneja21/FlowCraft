<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowCraft — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f0e;
      --bg2:       #131614;
      --bg3:       #1a1d1b;
      --border:    #2a2e2b;
      --border2:   #363c37;
      --text:      #e8ede9;
      --text2:     #8a9489;
      --text3:     #4d5a4e;
      --accent:    #5cdb8f;
      --accent2:   #3db870;
      --accent-dim:#1a3d28;
      --red:       #e05c5c;
      --red-dim:   #3d1a1a;
      --mono:      'DM Mono', monospace;
      --display:   'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
    }

    /* ── Blueprint grid background ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px),
        linear-gradient(var(--bg2) 1px, transparent 1px),
        linear-gradient(90deg, var(--bg2) 1px, transparent 1px);
      background-size: 80px 80px, 80px 80px, 16px 16px, 16px 16px;
      background-position: -1px -1px, -1px -1px, -1px -1px, -1px -1px;
      opacity: 0.5;
      z-index: 0;
    }

    /* ── Noise vignette ── */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, var(--bg) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* ── Corner decoration marks ── */
    .corner {
      position: fixed;
      width: 40px;
      height: 40px;
      z-index: 2;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--border2);
    }
    .corner::before { width: 100%; height: 1px; }
    .corner::after  { width: 1px; height: 100%; }
    .corner.tl { top: 24px; left: 24px; }
    .corner.tr { top: 24px; right: 24px; transform: scaleX(-1); }
    .corner.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
    .corner.br { bottom: 24px; right: 24px; transform: scale(-1); }

    /* ── Version tag ── */
    .version-tag {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text3);
      letter-spacing: 0.15em;
      z-index: 10;
    }

    /* ── Main layout ── */
    .stage {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 2px;
      padding: 0;
      overflow: hidden;
      animation: card-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card header ── */
    .card-header {
      padding: 32px 36px 28px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .card-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      animation: fade-up 0.5s 0.1s both;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--accent);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 20px;
      height: 20px;
    }

    .logo-name {
      font-family: var(--display);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .logo-name span {
      color: var(--accent);
    }

    .tagline {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: fade-up 0.5s 0.15s both;
    }

    /* ── Form area ── */
    .card-body {
      padding: 28px 36px 32px;
    }

    .field {
      margin-bottom: 20px;
      animation: fade-up 0.5s both;
    }
    .field:nth-child(1) { animation-delay: 0.2s; }
    .field:nth-child(2) { animation-delay: 0.25s; }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--text3);
      pointer-events: none;
      user-select: none;
    }

    input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 2px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 14px 12px 32px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: var(--text3);
    }

    input:focus {
      border-color: var(--accent);
      background: #0f1410;
    }

    input.error {
      border-color: var(--red);
      background: var(--red-dim);
    }

    /* ── Error message ── */
    .error-msg {
      display: none;
      margin-top: -12px;
      margin-bottom: 16px;
      font-size: 11px;
      color: var(--red);
      letter-spacing: 0.04em;
      animation: shake 0.3s both;
    }

    .error-msg.visible {
      display: block;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-5px); }
      75%       { transform: translateX(5px); }
    }

    /* ── Submit button ── */
    .btn-row {
      margin-top: 28px;
      animation: fade-up 0.5s 0.3s both;
    }

    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: #050e08;
      border: none;
      border-radius: 2px;
      font-family: var(--display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    button[type="submit"]:hover {
      background: var(--accent2);
    }

    button[type="submit"]:active {
      transform: scale(0.985);
    }

    button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Loading shimmer ── */
    .btn-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
      transform: translateX(-100%);
    }

    button[type="submit"].loading .btn-shimmer {
      animation: shimmer 0.8s ease-in-out;
    }

    @keyframes shimmer {
      to { transform: translateX(100%); }
    }

    /* ── Footer note ── */
    .card-footer {
      padding: 14px 36px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-footer span {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.08em;
    }

    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.08em;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Success overlay ── */
    .success-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .success-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .success-icon {
      width: 56px;
      height: 56px;
      border: 1.5px solid var(--accent);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success-label {
      font-family: var(--display);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .success-sub {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.1em;
    }

    /* Draw-on animation for check */
    .check-path {
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
    }
    .success-overlay.show .check-path {
      animation: draw-check 0.4s 0.2s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes draw-check {
      to { stroke-dashoffset: 0; }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="vignette"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="version-tag">FLOWCRAFT — v0.1.0 — PRIVATE</div>

  <div class="stage">
    <div class="card">

      <div class="card-header">
        <div class="logo-row">
          <div class="logo-mark">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="7" height="7" rx="1" stroke="#5cdb8f" stroke-width="1.2"/>
              <rect x="12" y="1" width="7" height="7" rx="1" stroke="#5cdb8f" stroke-width="1.2"/>
              <rect x="6.5" y="12" width="7" height="7" rx="1" stroke="#5cdb8f" stroke-width="1.2"/>
              <line x1="4.5" y1="8" x2="4.5" y2="15.5" stroke="#5cdb8f" stroke-width="1" stroke-opacity="0.5"/>
              <line x1="15.5" y1="8" x2="15.5" y2="15.5" stroke="#5cdb8f" stroke-width="1" stroke-opacity="0.5"/>
              <line x1="4.5" y1="15.5" x2="10" y2="15.5" stroke="#5cdb8f" stroke-width="1" stroke-opacity="0.5"/>
              <line x1="15.5" y1="15.5" x2="10" y2="15.5" stroke="#5cdb8f" stroke-width="1" stroke-opacity="0.5"/>
            </svg>
          </div>
          <div class="logo-name">Flow<span>Craft</span></div>
        </div>
        <div class="tagline">// personal workspace — authorized access only</div>
      </div>

      <div class="card-body">
        <form id="login-form" autocomplete="off" novalidate>

          <div class="field">
            <label for="username">Username</label>
            <div class="input-wrap">
              <span class="input-prefix">@</span>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="your_username"
                spellcheck="false"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
              <span class="input-prefix">#</span>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
              />
            </div>
          </div>

          <div class="error-msg" id="error-msg">
            — invalid credentials. try again.
          </div>

          <div class="btn-row">
            <button type="submit" id="submit-btn">
              <span class="btn-shimmer"></span>
              Enter workspace
            </button>
          </div>

        </form>
      </div>

      <div class="card-footer">
        <span>single-user mode</span>
        <span class="status-dot">
          <span class="dot"></span>
          system ready
        </span>
      </div>

    </div>
  </div>

  <!-- Success screen -->
  <div class="success-overlay" id="success-overlay">
    <div class="success-icon">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <path class="check-path" d="M5 13 L11 19 L21 7" stroke="#5cdb8f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="success-label">Access granted</div>
    <div class="success-sub">loading workspace...</div>
  </div>

  <script>
    const VALID_USER = 's_pathneja21';
    const VALID_PASS = '12345';

    const form     = document.getElementById('login-form');
    const userIn   = document.getElementById('username');
    const passIn   = document.getElementById('password');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn= document.getElementById('submit-btn');
    const overlay  = document.getElementById('success-overlay');

    function clearError() {
      errorMsg.classList.remove('visible');
      userIn.classList.remove('error');
      passIn.classList.remove('error');
    }

    userIn.addEventListener('input', clearError);
    passIn.addEventListener('input', clearError);

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      clearError();

      const user = userIn.value.trim();
      const pass = passIn.value;

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      setTimeout(() => {
        submitBtn.classList.remove('loading');

        if (user === VALID_USER && pass === VALID_PASS) {
          overlay.classList.add('show');
          // In a real build, redirect here:
          // setTimeout(() => { window.location.href = '/dashboard'; }, 1400);
        } else {
          submitBtn.disabled = false;
          userIn.classList.add('error');
          passIn.classList.add('error');
          errorMsg.classList.add('visible');
          passIn.value = '';
          passIn.focus();
        }
      }, 600);
    });
  </script>
</body>
</html>
